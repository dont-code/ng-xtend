@let entName = entityName();

@if (entName != null) {
  <wfw-render [workflowConfig]="workflowConfig()"></wfw-render>
} @else {
  <section class="entity-manager entity-manager--empty">
    <div class="entity-manager__state entity-manager__state--empty">
      <i class="pi pi-database"></i>
      <span>No entity to manage.</span>
    </div>
  </section>
}
