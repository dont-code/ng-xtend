@if (isInForm() ) {
  <ng-container [formGroup]="formGroup()">
    <div class="complete-in-form-container">
      <div class="complete-label"><span>Done</span></div>
      <div class="complete-checkbox"><p-checkbox [formControlName]="formControlName()" [binary]="true" (onChange)="taskCompleted ($event)"></p-checkbox></div>
    </div>
  </ng-container>
} @else {
  @let done = displayValue();
  @if (done!=null) {
    <div class="complete-view-container">
      <div class="complete-view-label">Done&nbsp;</div>
      <div class="complete-view-value"><p-checkbox [ngModel]="done" [binary]="true" [disabled]="true"></p-checkbox>
      </div>
    </div>
  }
}
