<div class="text-3xl text-center text-shadow-md">Default Workflow Testing app</div>
<p-toolbar>
  <ng-template #start>
    <div class="flex items-center gap-2">
      <p-button icon="pi pi-bullseye" label="List-Details" [disabled]="currentPage()=='/'" (onClick)="router.navigate(['/'])" pTooltip="Test the List-Details workflow"></p-button>
    </div>
  </ng-template>
  <ng-template #end>
    <div class="app-actions">
      <p-button
        [icon]="getThemeButtonIcon()"
        [label]="getThemeButtonLabel()"
        [severity]="getThemeButtonSeverity()"
        variant="outlined"
        rounded="true"
        (click)="themeMenu.toggle($event)">
      </p-button>
      <p-menu #themeMenu [model]="themeOptions" [popup]="true"></p-menu>
    </div>
  </ng-template>
</p-toolbar>

<router-outlet />
